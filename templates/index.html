<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Borsa Analiz — BIST Paneli</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
/* ═══════════════════════════════════════════════
   TOKEN SYSTEM — Dark & Light
═══════════════════════════════════════════════ */
:root {
  --sidebar-w: 260px;
  --topbar-h:  64px;
  --radius-lg: 16px;
  --radius-md: 12px;
  --radius-sm:  8px;
  --radius-xs:  6px;
  --accent:    #ddddddbd;
  --accent-dim: rgba(240,201,58,.12);
  --green:     #22c55e;
  --green-dim: rgba(34,197,94,.12);
  --red:       #ef4444;
  --red-dim:   rgba(239,68,68,.12);
  --blue:      #3b82f6;
  --blue-dim:  rgba(59,130,246,.12);
  --purple:    #8b5cf6;
  --cyan:      #06b6d4;
  --orange:    #f97316;
  --black:     #000000;
  --font:      'Plus Jakarta Sans', sans-serif;
  --mono:      'JetBrains Mono', monospace;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,.12);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.18);
  --transition: .18s ease;
}

/* Dark theme (default) */
[data-theme="dark"] {
  --bg-base:    #0f1117;
  --bg-surface: #181b25;
  --bg-raised:  #1e2130;
  --bg-hover:   #252838;
  --border:     rgba(255,255,255,.07);
  --border-md:  rgba(255,255,255,.12);
  --text-1:     #f0f2f8;
  --text-2:     #8b91ac;
  --text-3:     #4e5470;
  --sidebar-bg: #13151f;
  --topbar-bg:  #181b25;
  --card-bg:    #1e2130;
  --input-bg:   #13151f;
  --chart-grid: rgba(255,255,255,.04);
  --chart-tick: #4e5470;
  --tooltip-bg: #1e2130;
  --scrollbar:  rgba(255,255,255,.1);
}

/* Light theme */
[data-theme="light"] {
  --bg-base:    #f1f4f9;
  --bg-surface: #ffffff;
  --bg-raised:  #f8fafc;
  --bg-hover:   #eef1f7;
  --border:     rgba(0,0,0,.07);
  --border-md:  rgba(0,0,0,.12);
  --text-1:     #0f1117;
  --text-2:     #5a6282;
  --text-3:     #9ea7c4;
  --sidebar-bg: #ffffff;
  --topbar-bg:  #ffffff;
  --card-bg:    #ffffff;
  --input-bg:   #f1f4f9;
  --chart-grid: rgba(0,0,0,.05);
  --chart-tick: #9ea7c4;
  --tooltip-bg: #ffffff;
  --scrollbar:  rgba(0,0,0,.12);
}

/* ═══════════════════════════════════════════════
   BASE RESET
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); font-size: 14px; background: var(--bg-base); color: var(--text-1); line-height: 1.5; transition: background var(--transition), color var(--transition); }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 99px; }
a { text-decoration: none; color: inherit; }
button { font-family: var(--font); cursor: pointer; }

/* ═══════════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════════ */
.shell { display: flex; height: 100vh; overflow: hidden; }

/* ═══════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  transition: background var(--transition), border-color var(--transition);
  z-index: 20;
}

/* Logo */
.sb-logo {
  padding: 22px 20px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sb-logo-mark {
  display: flex;
  align-items: center;
  gap: 10px;
}
.sb-logo-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.sb-logo-text { line-height: 1.2; }
.sb-logo-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--text-1);
  letter-spacing: -.3px;
}
.sb-logo-sub {
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: .5px;
  text-transform: uppercase;
  margin-top: 1px;
}

/* Search */
.sb-search {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sb-search-inner { position: relative; }
.sb-search-ico {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 13px; opacity: .4; pointer-events: none;
}
#tickerSearch {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-1);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px 8px 30px;
  outline: none;
  text-transform: uppercase;
  transition: border-color var(--transition), background var(--transition);
  letter-spacing: .5px;
}
#tickerSearch::placeholder { text-transform: none; font-family: var(--font); opacity: .45; letter-spacing: 0; }
#tickerSearch:focus { border-color: var(--accent); }
.sb-search-btn {
  margin-top: 8px;
  width: 100%;
  background: var(--accent);
  color: #0f1117;
  border: none;
  border-radius: var(--radius-sm);
  padding: 9px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: .3px;
  transition: opacity var(--transition), transform .1s;
}
.sb-search-btn:hover { opacity: .9; }
.sb-search-btn:active { transform: scale(.98); }

/* Nav section label */
.sb-nav-label {
  padding: 14px 20px 6px;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-3);
  font-weight: 600;
  flex-shrink: 0;
}

/* Stock list */
.sb-stock-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 10px 16px;
}
.sb-stock-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: 1px solid transparent;
  transition: background var(--transition), border-color var(--transition);
}
.sb-stock-item:hover { background: var(--bg-hover); }
.sb-stock-item.active {
  background: var(--accent-dim);
  border-color: rgba(240,201,58,.2);
}
.sb-stock-item.active .si-ticker { color: var(--accent); }
.si-avatar {
  width: 34px; height: 34px;
  border-radius: var(--radius-sm);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-size: 10px;
  color: var(--accent);
  flex-shrink: 0;
  letter-spacing: .3px;
}
.si-info { flex: 1; min-width: 0; }
.si-ticker { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text-2); }
.si-name   { font-size: 12px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.si-sector { font-size: 10px; color: var(--text-3); margin-top: 1px; }

/* ═══════════════════════════════════════════════
   MAIN AREA
═══════════════════════════════════════════════ */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════ */
.topbar {
  height: var(--topbar-h);
  background: var(--topbar-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  flex-shrink: 0;
  z-index: 10;
  transition: background var(--transition), border-color var(--transition);
  gap: 16px;
}
.topbar-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
.topbar-ticker {
  font-size: 20px;
  font-weight: 800;
  color: var(--black);
  letter-spacing: -.3px;
  white-space: nowrap;
}
.topbar-divider { width: 1px; height: 20px; background: var(--border-md); flex-shrink: 0; }
.topbar-name { font-size: 13px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.topbar-price { font-family: var(--mono); font-size: 20px; font-weight: 600; letter-spacing: -.5px; }
.topbar-badge {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: var(--radius-xs);
  white-space: nowrap;
}
.topbar-badge.up   { background: var(--green-dim); color: var(--green); }
.topbar-badge.dn   { background: var(--red-dim);   color: var(--red); }
.topbar-badge.flat { background: var(--bg-raised);  color: var(--text-2); }

/* Theme toggle */
.theme-toggle {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-md);
  background: var(--bg-raised);
  color: var(--text-2);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all var(--transition);
  flex-shrink: 0;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

/* ═══════════════════════════════════════════════
   CONTENT SCROLL AREA
═══════════════════════════════════════════════ */
.content-scroll { flex: 1; overflow-y: auto; }
.content-inner  { padding: 24px 28px 40px; max-width: 1600px; }

/* ═══════════════════════════════════════════════
   SECTION HEADER
═══════════════════════════════════════════════ */
.sec-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.sec-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .3px;
  text-transform: uppercase;
  color: var(--text-2);
}
.sec-line { flex: 1; height: 1px; background: var(--border); }

/* ═══════════════════════════════════════════════
   COMPANY INFO CARD
═══════════════════════════════════════════════ */
.company-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
  transition: background var(--transition), border-color var(--transition);
}
.company-meta-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.meta-badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
  background: var(--blue-dim);
  color: var(--blue);
  border: 1px solid rgba(59,130,246,.2);
}
.meta-tag {
  font-size: 11px;
  color: var(--text-2);
  padding: 3px 8px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
}
.company-desc-text {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.75;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.desc-expand-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 6px;
  padding: 0;
  font-family: var(--font);
}

/* ═══════════════════════════════════════════════
   METRIC CARDS GRID
═══════════════════════════════════════════════ */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.m-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
  position: relative;
  overflow: hidden;
}
.m-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: transparent;
  border-radius: 0 0 0 var(--radius-md);
  transition: background var(--transition);
}
.m-card:hover { border-color: var(--border-md); box-shadow: var(--shadow-md); }
.m-card:hover::before { background: var(--accent); }

.m-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-3);
  margin-bottom: 8px;
}
.m-value {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 600;
  color: var(--text-1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -.5px;
}
.m-value.na       { color: var(--text-3); font-size: 15px; }
.m-value.positive { color: var(--green); }
.m-value.negative { color: var(--red); }
.m-sub {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 4px;
  font-weight: 500;
}

/* ═══════════════════════════════════════════════
   CHART CARDS
═══════════════════════════════════════════════ */
.chart-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 0;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
  transition: background var(--transition), border-color var(--transition);
  overflow: hidden;
}
.chart-card-header {
  padding: 18px 22px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.chart-card-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-1);
  letter-spacing: -.2px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.chart-card-title .icon { font-size: 16px; }
.chart-card-subtitle {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 3px;
  font-weight: 400;
}
.chart-card-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.chart-card-body {
  padding: 14px 22px 18px;
}
.chart-canvas-wrap { position: relative; height: 300px; }

/* ═══════════════════════════════════════════════
   PERIOD BUTTONS
═══════════════════════════════════════════════ */
.period-group { display: flex; gap: 3px; flex-wrap: wrap; }
.period-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-2);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  padding: 4px 9px;
  border-radius: var(--radius-xs);
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: .2px;
}
.period-btn:hover { border-color: var(--border-md); color: var(--text-1); }
.period-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #0f1117;
  font-weight: 700;
}

/* ═══════════════════════════════════════════════
   CURRENCY TOGGLE
═══════════════════════════════════════════════ */
.cur-group { display: flex; gap: 3px; }
.cur-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-2);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: var(--radius-xs);
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: .3px;
}
.cur-btn:hover { border-color: var(--border-md); color: var(--text-1); }
.cur-btn.active-try { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.cur-btn.active-usd { background: var(--blue-dim);  border-color: var(--blue);  color: var(--blue); }

/* ═══════════════════════════════════════════════
   COMPARISON CONTROLS
═══════════════════════════════════════════════ */
.comp-section { padding: 0 22px 16px; }
.comp-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
}
.comp-row-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-3);
  padding-top: 5px;
  white-space: nowrap;
  min-width: 80px;
}
.chip-group { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: 99px;
  border: 1px solid var(--border);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;
  color: var(--text-2);
}
.chip .cdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.chip.active  { border-color: var(--border-md); background: var(--bg-raised); color: var(--text-1); }
.chip:not(.active) { opacity: .4; }
.chip:hover   { opacity: 1; border-color: var(--border-md); }

/* Stock picker */
.stock-picker-wrap { position: relative; }
.stock-picker-row  { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.stock-tags        { display: flex; gap: 5px; flex-wrap: wrap; }
.stock-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px 3px 10px;
  border-radius: 99px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  border: 1px solid var(--border-md);
  background: var(--bg-raised);
  white-space: nowrap;
}
.stock-tag-rm {
  cursor: pointer; color: var(--text-3); font-size: 15px; line-height: 1;
  margin-left: 2px; transition: color var(--transition); background: none; border: none; padding: 0;
}
.stock-tag-rm:hover { color: var(--red); }
.stock-picker-input {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  color: var(--text-1);
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 10px;
  outline: none;
  width: 120px;
  text-transform: uppercase;
  transition: border-color var(--transition);
  letter-spacing: .5px;
}
.stock-picker-input::placeholder { text-transform: none; font-family: var(--font); opacity: .4; letter-spacing: 0; font-size: 11px; }
.stock-picker-input:focus { border-color: var(--accent); }
.stock-picker-dd {
  position: absolute;
  top: calc(100% + 4px); left: 0;
  min-width: 240px;
  background: var(--card-bg);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-md);
  z-index: 200;
  box-shadow: var(--shadow-lg);
  max-height: 220px;
  overflow-y: auto;
}
.stock-picker-dd.hidden { display: none; }
.picker-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px; cursor: pointer; transition: background var(--transition); gap: 8px;
}
.picker-item:hover { background: var(--bg-hover); }
.picker-item.already { opacity: .35; pointer-events: none; }
.picker-t { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--accent); }
.picker-n { font-size: 11px; color: var(--text-2); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }

/* ═══════════════════════════════════════════════
   CHART LEGEND
═══════════════════════════════════════════════ */
.legend-row { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-2); font-weight: 500; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

/* ═══════════════════════════════════════════════
   RATIO TABLES
═══════════════════════════════════════════════ */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 960px) { .two-col { grid-template-columns: 1fr; } }

.table-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: background var(--transition), border-color var(--transition);
}
.table-card-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.ratio-table { width: 100%; border-collapse: collapse; }
.ratio-table tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
.ratio-table td { padding: 10px 20px; font-size: 13px; }
.ratio-table td:first-child { color: var(--text-2); }
.ratio-table td:last-child {
  text-align: right;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-1);
}
.ratio-table td.na { color: var(--text-3); }

/* ═══════════════════════════════════════════════
   52-WEEK BAR
═══════════════════════════════════════════════ */
.week52-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
  transition: background var(--transition), border-color var(--transition);
}
.week52-track {
  position: relative; height: 6px;
  background: var(--border); border-radius: 3px;
  margin: 10px 0 14px;
}
.week52-fill {
  position: absolute; height: 100%;
  background: linear-gradient(90deg, var(--red), var(--green));
  border-radius: 3px;
}
.week52-thumb {
  position: absolute; top: 50%;
  transform: translate(-50%,-50%);
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg-base);
  box-shadow: 0 0 0 2px var(--accent);
}
.week52-labels {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text-2);
}

/* ═══════════════════════════════════════════════
   DAILY STATS GRID (smaller cards)
═══════════════════════════════════════════════ */
.daily-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
  gap: 12px;
  margin-bottom: 20px;
}

/* ═══════════════════════════════════════════════
   WELCOME / LOADING STATES
═══════════════════════════════════════════════ */
.welcome-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 20px;
  gap: 16px; text-align: center;
}
.welcome-icon { font-size: 56px; }
.welcome-title { font-size: 20px; font-weight: 700; color: var(--text-1); }
.welcome-sub   { font-size: 14px; color: var(--text-3); max-width: 340px; line-height: 1.7; }
.loading-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 20px; gap: 14px;
}
.spinner {
  width: 36px; height: 36px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text-3); }
.error-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 20px; gap: 12px; text-align: center;
}
.error-icon { font-size: 40px; }
.error-msg { color: var(--red); font-size: 14px; font-weight: 600; }
.error-hint { font-size: 12px; color: var(--text-3); }

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--card-bg);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-md);
  padding: 12px 18px;
  font-size: 13px; color: var(--text-1);
  z-index: 9999;
  transform: translateY(16px); opacity: 0;

  pointer-events: none;
  box-shadow: var(--shadow-lg);
  max-width: 340px;

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  const btn = document.getElementById("themeToggle");
  if (btn) btn.textContent = theme === "dark" ? "☀️" : "🌙";
  localStorage.setItem("ba_theme", theme);
  if (state.tryChart || state.usdChart || state.normChart) {
    loadTryPriceChart();
    loadUsdChart();
    loadNormChart();
  }
}
function toggleTheme() {
  const current = document.documentElement.getAttribute("data-theme");
  applyTheme(current === "dark" ? "light" : "dark");
}
(function(){ applyTheme(localStorage.getItem("ba_theme") || "dark"); })();

function isDark() { return document.documentElement.getAttribute("data-theme") === "dark"; }
function chartGridColor() { return isDark() ? "rgba(255,255,255,.05)" : "rgba(0,0,0,.06)"; }
function chartTickColor() { return isDark() ? "#4e5470" : "#9ea7c4"; }
function chartTooltipBg(){ return isDark() ? "#1e2130" : "#ffffff"; }

function fmt(v,d=2){ if(v==null) return "—"; return Number(v).toLocaleString("tr-TR",{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtPct(v){ if(v==null) return "—"; return (v>0?"+":"") + fmt(v) + "%"; }
function fmtLarge(v){ if(v==null) return "—"; if(v>=1e12) return fmt(v/1e12,2)+" T"; if(v>=1e9) return fmt(v/1e9,2)+" Mr"; if(v>=1e6) return fmt(v/1e6,2)+" Mn"; return fmt(v,0); }
function tickerShort(t){ return t.replace(".IS",""); }
function abbrev(name){ return name.split(" ").map(w=>w[0]).join("").substring(0,3).toUpperCase(); }
function periodApi(p){ return PERIOD_MAP_KEY[p] || p; }

function showToast(msg, err=false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (err?" err":"");
  setTimeout(()=>{ t.className="toast"; }, 3200);
}

async function apiFetch(path) {
  const r = await fetch(API + path);
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error || "API Hatası"); }
  return r.json();
}

        <div class="si-name">${s.name}</div>
        <div class="si-sector">${s.sector}</div>
      </div>
    </div>`).join("");
}

function searchTicker() {
  let v = document.getElementById("tickerSearch").value.trim().toUpperCase();
  if (!v) return;
  if (!v.endsWith(".IS")) v += ".IS";
  loadStock(v);
}
document.getElementById("tickerSearch").addEventListener("keydown", e => { if (e.key === "Enter") searchTicker(); });

async function loadStock(ticker) {
  state.ticker = ticker;
  state.standingsData = null;
  [state.tryChart, state.usdChart, state.normChart].forEach(c => { if (c) c.destroy(); });
  state.tryChart = null; state.usdChart = null; state.normChart = null;
  renderStockList();
  document.getElementById("welcomeMsg").style.display = "none";
  document.getElementById("dashContent").style.display = "block";
  document.getElementById("dashContent").innerHTML = `<div class="loading-state"><div class="spinner"></div><div class="loading-text">Veriler yükleniyor…</div></div>`;
  document.getElementById("topTicker").textContent = tickerShort(ticker);
  document.getElementById("topName").textContent = "Yükleniyor…";
  document.getElementById("topPrice").textContent = "—";
  const badge = document.getElementById("topChange");
  badge.textContent = "—"; badge.className = "topbar-badge flat";

  try {
    const data = await apiFetch(`/stock/${encodeURIComponent(ticker)}`);
    state.stockData = data;
    renderTopbar(data);
    renderDashboard(data);
    await Promise.all([loadTryPriceChart(), loadUsdChart(), loadNormChart(), loadStandings()]);
  } catch (e) {
    document.getElementById("dashContent").innerHTML = `<div class="error-state"><div class="error-icon">⚠️</div><div class="error-msg">${e.message}</div><div class="error-hint">Lütfen backend'in çalıştığından emin olun: <code>python app_updated.py</code></div></div>`;
    showToast(e.message, true);
  }
}

function renderTopbar(d) {
  document.getElementById("topTicker").textContent = tickerShort(d.ticker);
  document.getElementById("topName").textContent = d.name || d.ticker;
  document.getElementById("topPrice").textContent = d.current_price!=null ? fmt(d.current_price) + " " + (d.currency||"TRY") : "—";
  const badge = document.getElementById("topChange");
  const pct = d.day_change_pct, chg = d.day_change;
  if (pct != null) {
    badge.textContent = (pct > 0 ? "+" : "") + fmt(chg) + " (" + fmtPct(pct) + ")";
    badge.className = "topbar-badge " + (pct >= 0 ? "up" : "dn");
  }
}

function toggleDesc() {
  descExpanded = !descExpanded;
  const p = document.getElementById("descText");
  if (!p) return;

  p.nextElementSibling.textContent = descExpanded ? "Daha az göster" : "Daha fazla göster";

function renderDashboard(d) {
  const r = d.ratios || {};
  descExpanded = false;
  const keyMetrics = [
    { label:"F/K Oranı", val:r.pe_ratio, sub:"P/E (Geçmiş)" },
    { label:"İleri F/K", val:r.forward_pe, sub:"Forward P/E" },

    { label:"Borç/Özsermaye", val:r.debt_to_equity, sub:"D/E Oranı" },
    { label:"Cari Oran", val:r.current_ratio, sub:"Current Ratio" },

    { label:"Net Kâr Marjı", val:r.net_margin!=null?fmtPct(r.net_margin):null, raw:r.net_margin, sub:"Net Margin", pct:true },

  const financial = [
    ["Borç/Özsermaye", r.debt_to_equity!=null?fmt(r.debt_to_equity):"—"],
    ["Cari Oran", r.current_ratio!=null?fmt(r.current_ratio):"—"],
    ["Hızlı Oran", r.quick_ratio!=null?fmt(r.quick_ratio):"—"],

    ["Brüt Kâr Marjı", r.gross_margin!=null?fmtPct(r.gross_margin):"—"],

    ["Özsermaye Karlılığı", r.roe!=null?fmtPct(r.roe):"—"],
    ["Aktif Karlılığı", r.roa!=null?fmtPct(r.roa):"—"],
    ["Temettü Verimi", r.dividend_yield!=null?fmtPct(r.dividend_yield):"—"],
    ["Ödeme Oranı", r.payout_ratio!=null?fmtPct(r.payout_ratio):"—"],
    ["Kazanç Büyümesi", r.earnings_growth!=null?fmtPct(r.earnings_growth):"—"],
    ["Gelir Büyümesi", r.revenue_growth!=null?fmtPct(r.revenue_growth):"—"],
  ];
  const periodBtns = PERIODS.map(p => `<button class="period-btn ${state.period===p?'active':''}" onclick="setPeriod('${p}')">${p}</button>`).join("");
  const compChips = Object.entries(COMPARISON_ASSETS).map(([label,cfg]) => `<div class="chip ${state.comparisons.includes(label)?'active':''}" onclick="toggleCompare('${label}')" data-label="${label}"><div class="cdot" style="background:${cfg.color}"></div>${label}</div>`).join("");
  const usdCompChips = Object.entries(US_COMPARISON_ASSETS).map(([label,cfg]) => `<div class="chip ${state.usdComparisons.includes(label)?'active':''}" onclick="toggleUsdCompare('${label}')" data-usd-label="${label}"><div class="cdot" style="background:${cfg.color}"></div>${label}</div>`).join("");
  const stockTags = state.stockComps.map((sym,i)=>{ const col = STOCK_COMP_COLORS[i%STOCK_COMP_COLORS.length]; return `<span class="stock-tag" style="border-color:${col};color:${col}">${tickerShort(sym)}<button class="stock-tag-rm" onclick="removeStockComp('${sym}')">×</button></span>`; }).join("");
  const dropdownItems = POPULAR_STOCKS.filter(s=>s.ticker!==state.ticker).map(s=>`<div class="picker-item ${state.stockComps.includes(s.ticker)?'already':''}" onclick="addStockComp('${s.ticker}')"><span class="picker-t">${tickerShort(s.ticker)}</span><span class="picker-n">${s.name}</span></div>`).join("");
  const tableHtml = rows => `<table class="ratio-table">${rows.map(([k,v])=>`<tr><td>${k}</td><td class="${v==='—'?'na':''}">${v}</td></tr>`).join("")}</table>`;
  const companyBlock = d.description ? `<div class="company-card"><div class="company-meta-row">${d.sector?`<span class="meta-badge">${d.sector}</span>`:""}${d.industry?`<span class="meta-tag">${d.industry}</span>`:""}${d.exchange?`<span class="meta-tag">Borsa: <strong>${d.exchange}</strong></span>`:""}${d.currency?`<span class="meta-tag">Para Birimi: <strong>${d.currency}</strong></span>`:""}</div><p class="company-desc-text" id="descText">${d.description}</p><button class="desc-expand-btn" onclick="toggleDesc()">Daha fazla göster</button></div>` : "";

  document.getElementById("dashContent").innerHTML = `
    ${companyBlock}
    <div class="sec-header"><span class="sec-title">📌 Temel Göstergeler</span><div class="sec-line"></div></div>
    <div class="metrics-grid">${keyMetrics.map(m=>{ const vStr = m.val!=null ? (m.isStr ? m.val : (typeof m.val === "string" ? m.val : fmt(m.val))) : "—"; const isNA = vStr === "—"; let cls = ""; if (!isNA && m.pct && m.raw != null) cls = m.raw >= 0 ? "positive" : "negative"; return `<div class="m-card"><div class="m-label">${m.label}</div><div class="m-value ${isNA?'na':cls}">${vStr}</div><div class="m-sub">${m.sub}</div></div>`; }).join("")}</div>

    <div class="chart-card">
      <div class="chart-card-header">
        <div><div class="chart-card-title"><span class="icon">₺</span> TRY Fiyat Grafiği</div><div class="chart-card-subtitle">Sadece TL bazlı gerçek fiyat serisi</div></div>
        <div class="chart-card-controls"><div class="period-group">${periodBtns}</div></div>
      </div>
      <div class="chart-card-body"><div class="chart-canvas-wrap"><canvas id="tryPriceChart"></canvas></div><div class="legend-row" id="tryLegend"></div></div>
    </div>

    <div class="chart-card">
      <div class="chart-card-header">
        <div><div class="chart-card-title"><span class="icon">$</span> USD Fiyat Grafiği (Global Karşılaştırmalı)</div><div class="chart-card-subtitle">Ana seri USD'ye çevrilir. Global karşılaştırmalar okunabilirlik için baz 100 normalize edilir.</div></div>
        <div class="chart-card-controls"><div class="period-group">${periodBtns}</div></div>
      </div>
      <div class="comp-section"><div class="comp-row"><span class="comp-row-label">ABD Varlıkları</span><div class="chip-group">${usdCompChips}</div></div></div>
      <div class="chart-card-body" style="padding-top:0"><div class="chart-canvas-wrap"><canvas id="usdPriceChart"></canvas></div><div class="legend-row" id="usdLegend"></div></div>
    </div>

    <div class="chart-card">
      <div class="chart-card-header">
        <div><div class="chart-card-title"><span class="icon">📊</span> Karşılaştırmalı Grafik <span style="font-size:11px;font-weight:400;color:var(--text-3);margin-left:4px">(Baz = 100)</span></div><div class="chart-card-subtitle">Mevcut yerel benchmark ve hisse karşılaştırma sistemi korunur</div></div>
        <div class="chart-card-controls"><div class="period-group">${periodBtns}</div></div>
      </div>
      <div class="comp-section">
        <div class="comp-row"><span class="comp-row-label">Endeksler</span><div class="chip-group">${compChips}</div></div>
        <div class="comp-row"><span class="comp-row-label">Hisseler</span><div class="stock-picker-wrap" id="stockPickerWrap"><div class="stock-picker-row"><div class="stock-tags" id="stockCompTags">${stockTags}</div><input type="text" class="stock-picker-input" id="stockPickerInput" placeholder="Hisse ekle…" autocomplete="off" oninput="filterPickerDd(this.value)" onfocus="showPickerDd()"/></div><div class="stock-picker-dd hidden" id="stockPickerDd">${dropdownItems}</div></div></div>
      </div>
      <div class="chart-card-body" style="padding-top:0"><div class="chart-canvas-wrap"><canvas id="normChart"></canvas></div><div class="legend-row" id="normLegend"></div></div>
    </div>

    <div class="table-card" id="standingsCard">
      <div class="table-card-header">🏁 Performans Sıralaması</div>
      <div style="padding:16px 20px 18px">
        <div class="standings-toolbar">
          <div class="period-group">
            <button class="period-btn ${state.standingsView==='gainers'?'active':''}" onclick="setStandingsView('gainers')">Top 10 Yükselenler</button>
            <button class="period-btn ${state.standingsView==='losers'?'active':''}" onclick="setStandingsView('losers')">Top 10 Düşenler</button>
            <button class="period-btn ${state.standingsView==='all'?'active':''}" onclick="setStandingsView('all')">Tümü</button>
          </div>
          <div class="standings-meta" id="standingsMeta">${state.period} dönemine göre yükleniyor…</div>
        </div>
        <div class="standings-table-wrap" id="standingsWrap"><div class="empty-note">Yükleniyor…</div></div>
      </div>
    </div>

    ${week52Block}

    <div class="sec-header"><span class="sec-title">🔢 Finansal Oranlar</span><div class="sec-line"></div></div>
    <div class="two-col"><div class="table-card"><div class="table-card-header">💰 Değerleme Oranları</div>${tableHtml(valuation)}</div><div class="table-card"><div class="table-card-header">🏦 Finansal Sağlık</div>${tableHtml(financial)}</div></div>

    <div class="sec-header"><span class="sec-title">📋 Günlük Veriler</span><div class="sec-line"></div></div>
    <div class="daily-grid">${[["Açılış",d.open,"Open"],["Kapanış",d.previous_close,"Önceki Kapanış"],["Gün Yükseği",d.day_high,"Day High"],["Gün Düşüğü",d.day_low,"Day Low"],["Ort. Hacim",r.avg_volume,"Avg Volume"]].map(([label,val,sub])=>`<div class="m-card"><div class="m-label">${label}</div><div class="m-value ${val==null?'na':''}">${val!=null?fmt(val):"—"}</div><div class="m-sub">${sub}</div></div>`).join("")}</div>
  `;
  document.addEventListener("click", outsidePickerClick);
}

function showPickerDd(){ const dd=document.getElementById("stockPickerDd"); if(dd) dd.classList.remove("hidden"); }
function filterPickerDd(q){ const dd=document.getElementById("stockPickerDd"); if(!dd) return; dd.classList.remove("hidden"); const qu=q.trim().toUpperCase(); dd.querySelectorAll(".picker-item").forEach(el=>{ const t=el.querySelector(".picker-t").textContent; const n=el.querySelector(".picker-n").textContent.toUpperCase(); el.style.display=(!qu||t.includes(qu)||n.includes(qu))?"":"none"; }); }
function outsidePickerClick(e){ const wrap=document.getElementById("stockPickerWrap"); if(wrap && !wrap.contains(e.target)){ document.getElementById("stockPickerDd")?.classList.add("hidden"); } }
function addStockComp(ticker){ if(state.stockComps.includes(ticker)) return; state.stockComps.push(ticker); const inp=document.getElementById("stockPickerInput"); if(inp) inp.value=""; document.getElementById("stockPickerDd")?.classList.add("hidden"); refreshStockTags(); loadNormChart(); }
function removeStockComp(ticker){ state.stockComps = state.stockComps.filter(s=>s!==ticker); refreshStockTags(); loadNormChart(); }
function refreshStockTags(){ const c=document.getElementById("stockCompTags"); if(!c) return; c.innerHTML=state.stockComps.map((sym,i)=>{ const col=STOCK_COMP_COLORS[i%STOCK_COMP_COLORS.length]; return `<span class="stock-tag" style="border-color:${col};color:${col}">${tickerShort(sym)}<button class="stock-tag-rm" onclick="removeStockComp('${sym}')">×</button></span>`; }).join(""); document.querySelectorAll(".picker-item").forEach(el=>{ const t = el.getAttribute("onclick")?.match(/'([^']+)'/)?.[1]; if(t) el.classList.toggle("already", state.stockComps.includes(t)); }); }

function makeLegend(elId, items) { const el = document.getElementById(elId); if (!el) return; el.innerHTML = items.map(it => `<div class="legend-item"><div class="legend-dot" style="background:${it.color}"></div>${it.label}</div>`).join(""); }

async function loadTryPriceChart() {
  if (!state.ticker) return;
  try {
    const data = await apiFetch(`/price?ticker=${encodeURIComponent(state.ticker)}&period=${periodApi(state.period)}&currencies=TRY`);
    renderTryChart(data.TRY || []);
  } catch (e) { showToast("TRY grafiği yüklenemedi: " + e.message, true); }
}

function renderTryChart(points) {
  const canvas = document.getElementById("tryPriceChart");
  if (!canvas) return;
  if (state.tryChart) state.tryChart.destroy();
  const gc = chartGridColor(), tc = chartTickColor(), tt = chartTooltipBg();
  state.tryChart = new Chart(canvas.getContext("2d"), {
    type: "line",
    data: { datasets: [{ label: tickerShort(state.ticker) + " (₺)", data: points.filter(p=>p.c!=null).map(p=>({x:p.t,y:p.c})), borderColor: "#22c55e", backgroundColor: "rgba(34,197,94,.06)", borderWidth: 2.2, pointRadius: 0, fill: true, tension: .35 }] },
    options: { responsive: true, maintainAspectRatio: false, interaction:{mode:"x",intersect:false}, scales: { x:{type:"time",grid:{color:gc},ticks:{color:tc,maxTicksLimit:8,font:{family:"'JetBrains Mono',monospace",size:11}}}, y:{grid:{color:gc},ticks:{color:tc,font:{family:"'JetBrains Mono',monospace",size:11},callback:v=>"₺"+fmt(v,2)}} }, plugins:{legend:{display:false}, tooltip:{backgroundColor:tt,borderColor:isDark()?"rgba(255,255,255,.1)":"rgba(0,0,0,.08)",borderWidth:1,titleColor:tc,bodyColor:isDark()?"#f0f2f8":"#0f1117",padding:12,callbacks:{label:ctx=>` ${ctx.dataset.label}: ₺${fmt(ctx.parsed.y,2)}`}}} }
  });
  makeLegend("tryLegend", [{label: tickerShort(state.ticker) + " (₺ TL)", color: "#22c55e"}]);
}

async function loadUsdChart() {
  if (!state.ticker) return;
  try {
    const [priceData, usdCompData] = await Promise.all([
      apiFetch(`/price?ticker=${encodeURIComponent(state.ticker)}&period=${periodApi(state.period)}&currencies=USD`),
      apiFetch(`/usd-chart?ticker=${encodeURIComponent(state.ticker)}&period=${periodApi(state.period)}&comparisons=${encodeURIComponent(state.usdComparisons.join(','))}`),
    ]);
    renderUsdChart(priceData.USD || [], usdCompData || {});
  } catch (e) { showToast("USD grafiği yüklenemedi: " + e.message, true); }
}

function renderUsdChart(usdPoints, usdCompData) {
  const canvas = document.getElementById("usdPriceChart");
  if (!canvas) return;
  if (state.usdChart) state.usdChart.destroy();
  const datasets = [];
  const legends = [];
  const mainNorm = (usdCompData && usdCompData[state.ticker]) ? usdCompData[state.ticker] : [];
  datasets.push({ label: tickerShort(state.ticker) + " ($ USD)", data: usdPoints.filter(p=>p.c!=null).map(p=>({x:p.t,y:p.c})), borderColor: "#3b82f6", backgroundColor: "transparent", borderWidth: 2.4, pointRadius: 0, tension: .35, yAxisID: "yUsd" });
  legends.push({ label: tickerShort(state.ticker) + " ($ USD)", color: "#3b82f6" });
  for (const [label, cfg] of Object.entries(US_COMPARISON_ASSETS)) {
    if (!state.usdComparisons.includes(label) || !usdCompData[label]) continue;
    datasets.push({ label, data: usdCompData[label].filter(p=>p.n!=null).map(p=>({x:p.t,y:p.n})), borderColor: cfg.color, backgroundColor: "transparent", borderDash: [5,3], borderWidth: 1.8, pointRadius: 0, tension: .35, yAxisID: "yNorm" });
    legends.push({ label: label + " (Baz100)", color: cfg.color });
  }
  if (mainNorm.length) {
    datasets.push({ label: tickerShort(state.ticker) + " (Baz100)", data: mainNorm.filter(p=>p.n!=null).map(p=>({x:p.t,y:p.n})), borderColor: "#94a3b8", backgroundColor: "transparent", borderDash: [2,2], borderWidth: 1.4, pointRadius: 0, tension: .35, yAxisID: "yNorm" });
    legends.push({ label: tickerShort(state.ticker) + " (Baz100)", color: "#94a3b8" });
  }
  const gc = chartGridColor(), tc = chartTickColor(), tt = chartTooltipBg();
  state.usdChart = new Chart(canvas.getContext("2d"), {
    type: "line",
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction:{mode:"index",intersect:false},
      scales: {
        x:{type:"time",grid:{color:gc},ticks:{color:tc,maxTicksLimit:8,font:{family:"'JetBrains Mono',monospace",size:11}}},
        yUsd:{position:"left",grid:{color:gc},ticks:{color:"#3b82f6",font:{family:"'JetBrains Mono',monospace",size:11},callback:v=>"$"+fmt(v,3)},title:{display:true,text:"USD",color:"#3b82f6",font:{size:10}}},
        yNorm:{position:"right",grid:{drawOnChartArea:false},ticks:{color:tc,font:{family:"'JetBrains Mono',monospace",size:11},callback:v=>fmt(v,1)},title:{display:true,text:"Baz = 100",color:tc,font:{size:10}}}
      },
      plugins:{legend:{display:false},tooltip:{backgroundColor:tt,borderColor:isDark()?"rgba(255,255,255,.1)":"rgba(0,0,0,.08)",borderWidth:1,titleColor:tc,bodyColor:isDark()?"#f0f2f8":"#0f1117",padding:12,callbacks:{label:ctx=>ctx.dataset.yAxisID==="yUsd"?` ${ctx.dataset.label}: $${fmt(ctx.parsed.y,3)}`:` ${ctx.dataset.label}: ${fmt(ctx.parsed.y,2)}`}}}
    }
  });
  makeLegend("usdLegend", legends);
}

async function loadNormChart() {
  if (!state.ticker) return;
  try {
    const data = await apiFetch(`/chart?ticker=${encodeURIComponent(state.ticker)}&period=${periodApi(state.period)}&comparisons=${encodeURIComponent(state.comparisons.join(','))}&stocks=${encodeURIComponent(state.stockComps.join(','))}`);
    renderNormChart(data);
  } catch (e) { showToast("Karşılaştırma grafiği yüklenemedi: " + e.message, true); }
}

function renderNormChart(data) {
  const canvas = document.getElementById("normChart");
  if (!canvas) return;
  if (state.normChart) state.normChart.destroy();
  const datasets = [], legendItems = [];
  let colorIdx = 0;
  if (data[state.ticker]) {
    const pts = data[state.ticker].filter(p=>p.n!=null);
    const first = data[state.ticker][0]?.c, last = data[state.ticker][data[state.ticker].length-1]?.c;
    const col = (last || 0) >= (first || 0) ? "#22c55e" : "#ef4444";
    datasets.push({ label: tickerShort(state.ticker), data: pts.map(p=>({x:p.t,y:p.n})), borderColor: col, backgroundColor: "rgba(34,197,94,.05)", borderWidth: 2.4, pointRadius: 0, tension: .35, fill: true });
    legendItems.push({ label: tickerShort(state.ticker), color: col });
  }
  for (const [label, cfg] of Object.entries(COMPARISON_ASSETS)) {
    if (!state.comparisons.includes(label) || !data[label]) continue;
    datasets.push({ label, data: data[label].filter(p=>p.n!=null).map(p=>({x:p.t,y:p.n})), borderColor: cfg.color, backgroundColor: "transparent", borderWidth: 1.6, borderDash: [5,3], pointRadius: 0, tension: .35 });
    legendItems.push({ label, color: cfg.color });
  }
  for (const sym of state.stockComps) {
    if (!data[sym]) continue;
    const col = STOCK_COMP_COLORS[colorIdx++ % STOCK_COMP_COLORS.length];
    datasets.push({ label: tickerShort(sym), data: data[sym].filter(p=>p.n!=null).map(p=>({x:p.t,y:p.n})), borderColor: col, backgroundColor: "transparent", borderWidth: 2, borderDash: [3,2], pointRadius: 0, tension: .35 });
    legendItems.push({ label: tickerShort(sym), color: col });
  }
  const gc = chartGridColor(), tc = chartTickColor(), tt = chartTooltipBg();
  state.normChart = new Chart(canvas.getContext("2d"), {
    type: "line",
    data: { datasets },
    options: { responsive:true, maintainAspectRatio:false, interaction:{mode:"index",intersect:false}, scales:{ x:{type:"time",grid:{color:gc},ticks:{color:tc,maxTicksLimit:8,font:{family:"'JetBrains Mono',monospace",size:11}}}, y:{grid:{color:gc},ticks:{color:tc,font:{family:"'JetBrains Mono',monospace",size:11},callback:v=>fmt(v,1)},title:{display:true,text:"Baz = 100",color:tc,font:{size:10}}} }, plugins:{legend:{display:false},tooltip:{backgroundColor:tt,borderColor:isDark()?"rgba(255,255,255,.1)":"rgba(0,0,0,.08)",borderWidth:1,titleColor:tc,bodyColor:isDark()?"#f0f2f8":"#0f1117",padding:12,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmt(ctx.parsed.y,2)}`}}} }
  });
  makeLegend("normLegend", legendItems);
}

async function loadStandings() {
  try {
    const data = await apiFetch(`/standings?period=${encodeURIComponent(periodApi(state.period))}&view=${encodeURIComponent(state.standingsView)}`);
    state.standingsData = data;
    renderStandings();
  } catch (e) {
    const wrap = document.getElementById("standingsWrap");
    if (wrap) wrap.innerHTML = `<div class="empty-note">Sıralama yüklenemedi: ${e.message}</div>`;
  }
}

function renderStandings() {
  const meta = document.getElementById("standingsMeta");
  const wrap = document.getElementById("standingsWrap");
  if (!meta || !wrap || !state.standingsData) return;
  const rows = state.standingsData.rows || [];
  meta.textContent = `${state.period} dönemine göre ${state.standingsData.count || rows.length} hisse tarandı`;
  if (!rows.length) {
    wrap.innerHTML = `<div class="empty-note">Bu dönem için yeterli veri bulunamadı.</div>`;
    return;
  }
  wrap.innerHTML = `<table class="standings-table"><thead><tr><th>#</th><th>Ticker</th><th>Şirket</th><th>Başlangıç</th><th>Bitiş</th><th>% Değişim</th></tr></thead><tbody>${rows.map((row, idx)=>`<tr><td class="rank">${idx+1}</td><td class="num">${tickerShort(row.ticker)}</td><td>${row.name}</td><td class="num">₺${fmt(row.start_price,2)}</td><td class="num">₺${fmt(row.end_price,2)}</td><td class="num ${row.change_pct >= 0 ? 'standings-pos' : 'standings-neg'}">${fmtPct(row.change_pct)}</td></tr>`).join("")}</tbody></table>`;
}

function setPeriod(p) {
  state.period = p;
  document.querySelectorAll(".period-btn").forEach(btn => {
    const text = btn.textContent.trim();
    if (["Top 10 Yükselenler", "Top 10 Düşenler", "Tümü"].includes(text)) return;
    btn.classList.toggle("active", text === p);
  });
  loadTryPriceChart();
  loadUsdChart();
  loadNormChart();
  loadStandings();
}
function setStandingsView(v) { state.standingsView = v; renderDashboard(state.stockData); loadTryPriceChart(); loadUsdChart(); loadNormChart(); loadStandings(); }
function toggleCompare(label) { state.comparisons = state.comparisons.includes(label) ? state.comparisons.filter(c=>c!==label) : [...state.comparisons, label]; document.querySelectorAll("[data-label]").forEach(el=>el.classList.toggle("active", state.comparisons.includes(el.dataset.label))); loadNormChart(); }
function toggleUsdCompare(label) { state.usdComparisons = state.usdComparisons.includes(label) ? state.usdComparisons.filter(c=>c!==label) : [...state.usdComparisons, label]; document.querySelectorAll("[data-usd-label]").forEach(el=>el.classList.toggle("active", state.usdComparisons.includes(el.dataset.usdLabel))); loadUsdChart(); }

renderStockList();
</script>

</body>
</html>
